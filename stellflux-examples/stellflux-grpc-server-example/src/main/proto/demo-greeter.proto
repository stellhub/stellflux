syntax = "proto3";

package io.github.stellflux.examples.grpc.proto;

option java_multiple_files = true;
option java_package = "io.github.stellflux.examples.grpc.proto";
option java_outer_classname = "DemoGreeterProto";

service GreeterService {
  rpc SayHello(HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
