spring:
  application:
    name: stellflux-stellflow-example

server:
  port: 18082

stellflux:
  opentelemetry:
    resource:
      service-name: stellflux-stellflow-example
    logs:
      enabled: false
    metrics:
      enabled: false
    traces:
      enabled: false
  stellflow:
    bootstrap-servers: ${STELLFLOW_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    client-id: ${spring.application.name}
    request-timeout: 5s
    retry:
      max-attempts: 3
      backoff: 100ms
    producer:
      topic-configs:
        "[orders.created]":
          auto-create-topics: true
          auto-create-topic-partition-count: 1
      acks: 1
      timeout-ms: 5000
      max-batch-records: 16
      auto-create-topics: true
      auto-create-topic-partition-count: 1
      partitioner: default
    consumer:
      topic-configs:
        "[orders.created]":
          group-id: stellflux-order-listener
          poll-timeout: 3s
      session-timeout-ms: 10000
      heartbeat-interval: 3s
      fetch-max-bytes: 1048576
      offset-commit-metadata: stellflux-stellflow-example
